<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ShotZoo - Company Registration</title>
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Fonts -->
    <link
        href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&amp;f[]=satoshi@400,500,600,700&amp;f[]=jet-brains-mono@400&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#151c27",
                        "on-secondary": "#ffffff",
                        "background": "#f9f9ff",
                        "on-surface-variant": "#444939",
                        "surface": "#f9f9ff",
                        "secondary": "#0058be",
                        "on-secondary-fixed-variant": "#004395",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary-fixed-dim": "#ffb95f",
                        "secondary-fixed-dim": "#adc6ff",
                        "inverse-primary": "#aed367",
                        "on-primary": "#ffffff",
                        "primary-container": "#a8cd62",
                        "on-secondary-container": "#fefcff",
                        "on-tertiary-fixed": "#2a1700",
                        "surface-dim": "#d3daea",
                        "surface-container": "#e7eefe",
                        "on-background": "#151c27",
                        "tertiary-container": "#ffb044",
                        "on-primary-container": "#3c5600",
                        "secondary-fixed": "#d8e2ff",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e2e8f8",
                        "on-secondary-fixed": "#001a42",
                        "surface-container-highest": "#dce2f3",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#496800",
                        "outline": "#757968",
                        "inverse-surface": "#2a313d",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#ebf1ff",
                        "primary-fixed": "#c9f080",
                        "surface-variant": "#dce2f3",
                        "on-primary-fixed": "#131f00",
                        "secondary-container": "#2170e4",
                        "surface-bright": "#f9f9ff",
                        "on-error-container": "#93000a",
                        "surface-tint": "#496800",
                        "error": "#ba1a1a",
                        "tertiary": "#855300",
                        "on-tertiary-container": "#6f4500",
                        "primary-fixed-dim": "#aed367",
                        "outline-variant": "#c4c9b5",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffddb8",
                        "surface-container-low": "#f0f3ff",
                        "on-primary-fixed-variant": "#364e00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "14px",
                        "xl": "18px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #F7F8F4;
            color: #151c27;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .font-editorial {
            font-family: 'Space Grotesk', sans-serif;
        }

        .font-mono-data {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Input Ghost Border Effect */
        .input-ghost {
            background-color: #f0f3ff;
            border: none;
            border-bottom: 2px solid rgba(196, 201, 181, 0.15);
            transition: all 0.2s ease;
        }

        .input-ghost:focus {
            background-color: #e2e8f8;
            border-bottom: 2px solid #a8cd62;
            outline: none;
            box-shadow: none;
        }

        .shadow-card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 md:p-12">
    <!-- Auth Layout Wrapper -->
    <main class="w-full max-w-[480px] space-y-10">
        <!-- Brand Identity -->
        <header class="flex flex-col items-center space-y-6">
            <div class="text-[24px] font-[700] tracking-tight font-editorial text-on-surface">
                ShotZoo
            </div>
            <div class="text-center space-y-2">
                <h1 class="text-[1.75rem] font-editorial font-[800] tracking-tight text-on-surface leading-none">
                    Register Your Company
                </h1>
                <p class="text-[1rem] text-on-surface-variant font-[400] font-body">
                    Set up your team's admin workspace
                </p>
            </div>
        </header>
        <!-- Registration Card -->
        <div class="bg-surface-container-lowest rounded-lg shadow-card p-8 space-y-8">
            <!-- Company Details Section -->
            <section class="space-y-4">
                <div class="flex items-center gap-6">
                    <div class="flex-shrink-0">
                        <label
                            class="block text-[0.75rem] font-[600] text-on-surface-variant mb-2 font-label">Logo</label>
                        <div
                            class="w-20 h-20 rounded-lg bg-surface-container-low flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors group relative overflow-hidden">
                            <span
                                class="material-symbols-outlined text-outline group-hover:scale-110 transition-transform">add_a_photo</span>
                            <span class="text-[10px] font-mono-data text-outline-variant mt-1 uppercase">80x80</span>
                            <input class="absolute inset-0 opacity-0 cursor-pointer" type="file" />
                        </div>
                    </div>
                    <div class="flex-grow space-y-4">
                        <div class="space-y-1.5">
                            <label class="block text-[0.75rem] font-[600] text-on-surface-variant font-label">Company
                                Name</label>
                            <input class="input-ghost w-full px-4 py-3 rounded-t-lg font-body text-sm"
                                placeholder="e.g. Acme Studio" type="text" />
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-[0.75rem] font-[600] text-on-surface-variant font-label">Company
                                Code</label>
                            <input
                                class="input-ghost w-full px-4 py-3 rounded-t-lg font-mono-data text-xs tracking-wider"
                                placeholder="ACME-2024" type="text" />
                            <p class="text-[11px] text-outline italic">Unique identifier for team join requests.</p>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label
                            class="block text-[0.75rem] font-[600] text-on-surface-variant font-label">Industry</label>
                        <select class="input-ghost w-full px-4 py-3 rounded-t-lg font-body text-sm appearance-none">
                            <option>Photography</option>
                            <option>Videography</option>
                            <option>Creative Agency</option>
                            <option>Production House</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-[0.75rem] font-[600] text-on-surface-variant font-label">Company
                            Size</label>
                        <select class="input-ghost w-full px-4 py-3 rounded-t-lg font-body text-sm appearance-none">
                            <option>1-10 Employees</option>
                            <option>11-50 Employees</option>
                            <option>51-200 Employees</option>
                            <option>200+ Employees</option>
                        </select>
                    </div>
                </div>
            </section>
            <!-- Divider with Label -->
            <div class="relative py-2">
                <div aria-hidden="true" class="absolute inset-0 flex items-center">
                    <div class="w-full bg-surface-container-low h-[1px]"></div>
                </div>
                <div class="relative flex justify-center">
                    <span
                        class="bg-surface-container-lowest px-4 text-[0.75rem] font-[700] text-on-surface-variant font-editorial tracking-widest uppercase">
                        Admin Account
                    </span>
                </div>
            </div>
            <!-- Admin Account Section -->
            <section class="space-y-4">
                <div class="space-y-1.5">
                    <label class="block text-[0.75rem] font-[600] text-on-surface-variant font-label">Full Name</label>
                    <input class="input-ghost w-full px-4 py-3 rounded-t-lg font-body text-sm" placeholder="Jane Cooper"
                        type="text" />
                </div>
                <div class="space-y-1.5">
                    <label class="block text-[0.75rem] font-[600] text-on-surface-variant font-label">Email
                        Address</label>
                    <input class="input-ghost w-full px-4 py-3 rounded-t-lg font-body text-sm"
                        placeholder="jane@shotzoo.com" type="email" />
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label
                            class="block text-[0.75rem] font-[600] text-on-surface-variant font-label">Password</label>
                        <div class="relative">
                            <input class="input-ghost w-full px-4 py-3 rounded-t-lg font-body text-sm"
                                type="password" />
                            <button
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-[18px]">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-[0.75rem] font-[600] text-on-surface-variant font-label">Confirm
                            Password</label>
                        <div class="relative">
                            <input class="input-ghost w-full px-4 py-3 rounded-t-lg font-body text-sm"
                                type="password" />
                            <button
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-[18px]">visibility</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
            <!-- Actions -->
            <div class="pt-4">
                <button
                    class="w-full py-4 bg-primary-container text-on-primary-container font-[700] rounded-lg transition-all duration-200 active:scale-[0.98] hover:brightness-95 shadow-sm font-body">
                    Register &amp; Continue
                </button>
            </div>
        </div>
        <!-- Footer Link -->
        <footer class="text-center pb-8">
            <p class="text-sm font-body text-on-surface-variant">
                Already registered?
                <a class="text-primary font-[700] ml-1 hover:underline decoration-2 underline-offset-4"
                    href="/company/signin">
                    Sign In
                </a>
            </p>
        </footer>
    </main>
    <!-- Visual Decor for Editorial Feel (Asymmetric breathing) -->
    <div class="fixed top-0 left-0 w-full h-1 bg-primary-container/20"></div>
    <div class="fixed top-12 left-12 hidden xl:block">
        <div class="w-24 h-[1px] bg-outline-variant opacity-20"></div>
    </div>
    <div class="fixed bottom-12 right-12 hidden xl:block">
        <div class="flex flex-col items-end space-y-2 opacity-10">
            <span class="font-mono-data text-[10px] tracking-tighter">VERSION 2.0.48</span>
            <div class="w-12 h-[1px] bg-outline-variant"></div>
        </div>
    </div>
</body>

</html>
