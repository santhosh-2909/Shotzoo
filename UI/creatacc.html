<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>ShotZoo | Join the Jungle</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Manrope:wght@200..800&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#292b23",
                        "surface-container-low": "#1a1c15",
                        "on-primary": "#243600",
                        "inverse-on-surface": "#2f3129",
                        "surface-container-lowest": "#0d0f08",
                        "secondary-container": "#404e26",
                        "surface-container-highest": "#33362d",
                        "on-primary-fixed-variant": "#364e00",
                        "on-tertiary-fixed": "#36003d",
                        "background": "#12140d",
                        "secondary": "#bccd99",
                        "on-secondary": "#28350f",
                        "on-surface-variant": "#c4c9b5",
                        "secondary-fixed-dim": "#bccd99",
                        "on-primary-fixed": "#131f00",
                        "on-primary-container": "#3f5a00",
                        "outline": "#8e9381",
                        "surface-tint": "#add366",
                        "primary-container": "#add366",
                        "surface-bright": "#383a31",
                        "surface-container": "#1e2019",
                        "on-error": "#690005",
                        "on-secondary-fixed-variant": "#3e4b24",
                        "on-tertiary-container": "#7b3681",
                        "on-secondary-container": "#aebf8c",
                        "error-container": "#93000a",
                        "on-tertiary": "#540f5c",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#d8e9b4",
                        "outline-variant": "#444939",
                        "surface-dim": "#12140d",
                        "on-tertiary-fixed-variant": "#6e2a75",
                        "primary": "#c8f07f",
                        "on-background": "#e3e3d7",
                        "inverse-surface": "#e3e3d7",
                        "surface-variant": "#33362d",
                        "tertiary": "#ffd6fc",
                        "on-secondary-fixed": "#131f00",
                        "inverse-primary": "#496800",
                        "tertiary-container": "#fcaafe",
                        "tertiary-fixed": "#ffd6fc",
                        "surface": "#12140d",
                        "primary-fixed": "#c9f07f",
                        "primary-fixed-dim": "#add366",
                        "on-surface": "#e3e3d7",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#fcaafe"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .clay-shadow {
            box-shadow: 0 20px 40px rgba(240, 240, 240, 0.06), 0 10px 10px rgba(240, 240, 240, 0.04);
        }

        .clay-button-inner {
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.2);
        }

        .soft-indent {
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        .abstract-clay-shape {
            background: linear-gradient(135deg, #add366 0%, #60811d 100%);
            border-radius: 43% 57% 70% 30% / 30% 45% 55% 70%;
            filter: blur(1px);
            position: relative;
        }

        .abstract-clay-shape::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            background: rgba(255, 255, 255, 0.15);
            filter: blur(20px);
            border-radius: inherit;
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface overflow-x-hidden">
    <main class="min-h-screen flex flex-col md:flex-row">
        <!-- Left Panel: Branding & Abstract Aesthetic -->
        <section
            class="w-full md:w-1/2 bg-surface-container-lowest flex flex-col justify-between p-12 relative overflow-hidden">
            <!-- Logo Area -->
            <div class="z-10 flex items-center gap-3">
                <img alt="ShotZoo Logo" class="h-10 w-auto"
                    data-alt="Minimalist geometric logo icon with sharp precision lines and a modern professional tech aesthetic"
                    src="https://lh3.googleusercontent.com/aida/ADBb0uh0yzFX18O5k2VDc9IwOQT5KRQKRr1JvfZ58clQOiDgQPbEhaiKXVARFjp_uAkOxcUY3FaDwJXbPyAKQbMcY_pO2QLWFINGSdsIReApSkwNUimHpRo0lX-ec4k5x11b3OhoGPEI2YeXbqJANoxAxYf1_W6_jkyTLWaotTyJeKJVWsD3QXp2t_wz1WDiyiRvw82YcX4oz0-YH71hJsgsq3KfnPcvCEGAFQeJqrQfMGuUbskJiufleE4LQKlDt1NEgfwe8f887j2CSg"
                    style="">
                <span class="font-headline font-bold text-2xl tracking-tighter text-primary-fixed-dim"
                    style="">ShotZoo</span>
            </div>
            <!-- Abstract Clay Centerpiece -->
            <div class="flex-grow flex items-center justify-center py-20 z-10">
                <div class="abstract-clay-shape w-64 h-64 md:w-96 md:h-96 clay-shadow flex items-center justify-center">
                    <img alt="ShotZoo Logo" class="h-32 w-auto object-contain opacity-90 drop-shadow-lg"
                        src="https://lh3.googleusercontent.com/aida/ADBb0ujQACc8pUB2qorRzq8WGIpYCyhCfhplQbaICgsvK3_d2SA_7imjZ_7_Ul9mjb1oVDXusP_apddLwgry4kE4gAhDKkpg-XY98XSPViIfQn4qpqFbpedLLISsVmY5U3dHTUT7u0mLL3_6q_drGg1CTwA8RaKsfRVVDf1R1aSMAc808xn0oA2ukQHh0-xbl_t9Y193Y6IF88xDeObwykf2Npas0GOe68j-qZfFmtJfLPxq7CIQfNUR1NOcx8WyJlRIG4-cP786x69GZg"
                        style="">
                </div>
            </div>
            <!-- Bottom Tagline -->
            <div class="z-10">
                <h2 class="font-headline font-bold text-5xl md:text-6xl text-white tracking-tighter leading-none mb-4"
                    style="">Join the&nbsp; ShotZoo.</h2>
                <p class="font-headline text-2xl text-primary-fixed-dim opacity-80" style="">Grow with us.</p>
            </div>
            <!-- Decorative background elements -->
            <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-primary/5 rounded-full blur-3xl"></div>
            <div class="absolute top-1/4 -left-10 w-40 h-40 bg-primary-container/10 rounded-full blur-2xl"></div>
        </section>
        <!-- Right Panel: Sign-Up Form -->
        <section
            class="w-full md:w-1/2 bg-on-background text-surface flex items-center justify-center p-8 md:p-16 lg:p-24">
            <div class="w-full max-w-lg">
                <header class="mb-10">
                    <h1 class="font-headline font-bold text-4xl text-surface-container-lowest tracking-tight mb-2"
                        style="">Create your account</h1>
                    <p class="text-surface-container-highest font-medium" style="">Precision start for your professional
                        journey.</p>
                </header>
                <form action="dashboard.html" method="get" class="space-y-6">
                    <!-- Profile Photo Upload -->
                    <div class="flex flex-col items-center justify-center mb-8">
                        <div class="relative group">
                            <label class="cursor-pointer" for="photo-upload" style="">
                                <div
                                    class="w-32 h-32 rounded-full border-2 border-dashed border-outline-variant flex flex-col items-center justify-center bg-surface-container-lowest/5 hover:bg-surface-container-lowest/10 transition-all duration-300 group-hover:scale-105">
                                    <span class="material-symbols-outlined text-surface-container-highest text-3xl mb-1"
                                        style="">add_a_photo</span>
                                    <span
                                        class="text-[10px] font-bold uppercase tracking-widest text-surface-container-highest"
                                        style="">Upload Photo</span>
                                </div>
                            </label>
                            <input class="hidden" id="photo-upload" type="file">
                        </div>
                    </div>
                    <!-- Name & Email Row -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label
                                class="text-xs font-bold font-headline uppercase tracking-wider text-surface-container-highest px-1"
                                style="">Full Name</label>
                            <input
                                class="w-full h-[48px] px-4 rounded-[12px] bg-surface-container-highest/10 border-none ring-1 ring-surface-container-highest/20 focus:ring-2 focus:ring-primary-container focus:bg-white transition-all outline-none font-body text-surface"
                                placeholder="John Doe" type="text">
                        </div>
                        <div class="space-y-1.5">
                            <label
                                class="text-xs font-bold font-headline uppercase tracking-wider text-surface-container-highest px-1"
                                style="">Email Address</label>
                            <input
                                class="w-full h-[48px] px-4 rounded-[12px] bg-surface-container-highest/10 border-none ring-1 ring-surface-container-highest/20 focus:ring-2 focus:ring-primary-container focus:bg-white transition-all outline-none font-body text-surface"
                                placeholder="john@shotzoo.io" type="email">
                        </div>
                    </div>
                    <!-- Phone & Company -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label
                                class="text-xs font-bold font-headline uppercase tracking-wider text-surface-container-highest px-1"
                                style="">Phone</label>
                            <input
                                class="w-full h-[48px] px-4 rounded-[12px] bg-surface-container-highest/10 border-none ring-1 ring-surface-container-highest/20 focus:ring-2 focus:ring-primary-container focus:bg-white transition-all outline-none font-body text-surface"
                                placeholder="+1 (555) 000-0000" type="tel">
                        </div>
                        <div class="space-y-1.5">
                            <label
                                class="text-xs font-bold font-headline uppercase tracking-wider text-surface-container-highest px-1"
                                style="">Company</label>
                            <select
                                class="w-full h-[48px] px-4 rounded-[12px] bg-surface-container-highest/10 border-none ring-1 ring-surface-container-highest/20 focus:ring-2 focus:ring-primary-container focus:bg-white transition-all outline-none font-body text-surface appearance-none">
                                <option disabled="" selected="" value="">Select Company</option>
                                <option value="shotzoo">ShotZoo HQ</option>
                                <option value="tactile">Tactile Precision Systems</option>
                                <option value="jungle">Jungle Logistics</option>
                            </select>
                        </div>
                    </div>
                    <!-- Role -->
                    <div class="space-y-1.5">
                        <label
                            class="text-xs font-bold font-headline uppercase tracking-wider text-surface-container-highest px-1"
                            style="">Role / Designation</label>
                        <input
                            class="w-full h-[48px] px-4 rounded-[12px] bg-surface-container-highest/10 border-none ring-1 ring-surface-container-highest/20 focus:ring-2 focus:ring-primary-container focus:bg-white transition-all outline-none font-body text-surface"
                            placeholder="Creative Operations Lead" type="text">
                    </div>
                    <!-- Passwords -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label
                                class="text-xs font-bold font-headline uppercase tracking-wider text-surface-container-highest px-1"
                                style="">Password</label>
                            <input
                                class="w-full h-[48px] px-4 rounded-[12px] bg-surface-container-highest/10 border-none ring-1 ring-surface-container-highest/20 focus:ring-2 focus:ring-primary-container focus:bg-white transition-all outline-none font-body text-surface"
                                placeholder="••••••••" type="password">
                        </div>
                        <div class="space-y-1.5">
                            <label
                                class="text-xs font-bold font-headline uppercase tracking-wider text-surface-container-highest px-1"
                                style="">Confirm Password</label>
                            <input
                                class="w-full h-[48px] px-4 rounded-[12px] bg-surface-container-highest/10 border-none ring-1 ring-surface-container-highest/20 focus:ring-2 focus:ring-primary-container focus:bg-white transition-all outline-none font-body text-surface"
                                placeholder="••••••••" type="password">
                        </div>
                    </div>
                    <!-- Primary CTA -->
                    <div class="pt-4">
                        <button
                            class="w-full h-[56px] bg-primary-container text-on-primary-container font-headline font-bold text-lg rounded-[20px] clay-shadow clay-button-inner hover:scale-[1.02] active:scale-95 transition-all duration-300"
                            type="submit" style="">
                            Create Account
                        </button>
                    </div>
                    <!-- Footer Links & Notes -->
                    <footer class="text-center space-y-4 pt-6">
                        <p class="font-body text-sm font-medium text-surface-container-highest" style="">
                            Already have an account?
                            <a class="text-primary-fixed-dim font-bold hover:underline ml-1" href="/admin/adminsign.html" style="">Sign
                                In</a>
                        </p>
                        <div
                            class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-highest/5 rounded-full inline-flex mx-auto">
                            <span class="material-symbols-outlined text-[16px] text-surface-container-highest"
                                style="">info</span>
                            <span class="text-[10px] font-bold uppercase tracking-widest text-surface-container-highest"
                                style="">Employee ID auto generated</span>
                        </div>
                    </footer>
                </form>
            </div>
        </section>
    </main>
    <!-- Global Footer (Suppressed based on Transactional Shell visibility rule) -->
    <!-- Navigation (Suppressed based on Transactional Shell visibility rule) -->
</body>

</html>
