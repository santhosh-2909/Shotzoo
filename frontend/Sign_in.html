<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ShotZoo - Sign In</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="base.css" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#12140d",
                        "error": "#ffb4ab",
                        "on-surface-variant": "#c4c9b5",
                        "outline-variant": "#444939",
                        "secondary": "#bccd99",
                        "on-secondary-container": "#aebf8c",
                        "on-primary-fixed": "#131f00",
                        "surface-container-lowest": "#0d0f08",
                        "outline": "#8e9381",
                        "inverse-surface": "#e3e3d7",
                        "surface-variant": "#33362d",
                        "on-tertiary-container": "#7b3681",
                        "surface-container-low": "#1a1c15",
                        "on-tertiary-fixed-variant": "#6e2a75",
                        "inverse-primary": "#496800",
                        "on-tertiary-fixed": "#36003d",
                        "surface-container-high": "#292b23",
                        "surface-tint": "#add366",
                        "surface-container-highest": "#33362d",
                        "on-secondary-fixed-variant": "#3e4b24",
                        "surface-container": "#1e2019",
                        "secondary-fixed": "#d8e9b4",
                        "secondary-fixed-dim": "#bccd99",
                        "on-primary": "#243600",
                        "surface": "#12140d",
                        "tertiary-container": "#fcaafe",
                        "tertiary-fixed-dim": "#fcaafe",
                        "on-tertiary": "#540f5c",
                        "surface-bright": "#383a31",
                        "primary-fixed-dim": "#add366",
                        "primary-container": "#add366",
                        "on-error-container": "#ffdad6",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#364e00",
                        "on-secondary": "#28350f",
                        "on-surface": "#e3e3d7",
                        "inverse-on-surface": "#2f3129",
                        "secondary-container": "#404e26",
                        "on-background": "#e3e3d7",
                        "on-primary-container": "#3f5a00",
                        "background": "#12140d",
                        "primary": "#c8f07f",
                        "tertiary": "#ffd6fc",
                        "on-secondary-fixed": "#131f00",
                        "primary-fixed": "#c9f07f",
                        "tertiary-fixed": "#ffd6fc"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "20px",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    boxShadow: {
                        'clay': '0 20px 40px rgba(0, 0, 0, 0.06), 0 8px 16px rgba(0, 0, 0, 0.04), inset 0 2px 4px rgba(255, 255, 255, 0.2)',
                        'clay-hover': '0 30px 60px rgba(0, 0, 0, 0.1), 0 12px 24px rgba(0, 0, 0, 0.06), inset 0 2px 4px rgba(255, 255, 255, 0.2)'
                    }
                }
            }
        }
    </script>
    <style>
        .clay-focal-point {
            background: linear-gradient(135deg, #add366 0%, #60811d 100%);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(2px);
            box-shadow:
                inset -20px -20px 50px rgba(0, 0, 0, 0.2),
                inset 20px 20px 50px rgba(255, 255, 255, 0.3),
                30px 40px 60px rgba(0, 0, 0, 0.4);
        }

        .soft-indent {
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.05), inset -2px -2px 5px rgba(255, 255, 255, 0.05);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .logo-outline {
            text-shadow: -3px -3px 0 #add366, 3px -3px 0 #add366, -3px 3px 0 #add366, 3px 3px 0 #add366;
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface selection:bg-primary/30 animate-fade-in">
    <main class="flex min-h-screen w-full overflow-hidden">
        <!-- Left Panel: Branding & Visuals -->
        <section class="hidden md:flex md:w-1/2 bg-[#0d0f08] flex-col justify-between p-12 relative overflow-hidden">
            <!-- Background Grain/Texture simulation -->
            <div class="absolute inset-0 opacity-10 pointer-events-none"
                style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCPf-Xzwk_bs8eekNe5bSCdVP0XzhI674Uni0VvzTZm3lW6UBKV30XkBSSoaQa6kh2K8A0St2NN_SYiaMBhPgTWPIV_BDrEq5ObdvWCZnp9E9NJBgW8D19hxsLyOx0xWz-snpOKPx8zqh9neHMj8OZbBwTYIdccfjLRz1he1Cq43kJj0msAi9zPj5D39xQUqFLKqEieI5xBSYoQIliF306yYonP7pb45OOyTdULpSkpF1QsTqDIQlCan3rIFOWwjbxTAfJCZFsgO0o");'>
            </div>
            <!-- Header Brand -->
            <div class="z-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary-container rounded-xl flex items-center justify-center shadow-clay">
                        <img alt="ShotZoo Logo" class="w-full h-full object-contain"
                            src="/company_logo.jpeg" />
                    </div>
                    <span class="text-3xl font-headline font-bold text-white tracking-tighter">ShotZoo</span>
                </div>
            </div>
            <!-- Focal Visual Area -->
            <div class="flex-1 flex items-center justify-center relative">
                <div class="clay-focal-point w-[400px] h-[400px] animate-pulse transition-all duration-[5000ms]"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center justify-center gap-4">
                    <!-- ShotZoo Logo - clean, no overlaps -->
                    <div class="flex flex-col items-center">
                        <div class="relative">
                            <!-- Large SZ text as the logo mark -->
                            <span class="text-[120px] font-headline font-black text-white leading-none tracking-tighter drop-shadow-[0_4px_20px_rgba(0,0,0,0.5)] logo-outline">SZ</span>
                        </div>
                        <!-- Separator line -->
                        <div class="w-32 h-[2px] bg-gradient-to-r from-transparent via-white/40 to-transparent mt-2 mb-4"></div>
                        <!-- Brand name -->
                        <div class="text-3xl font-headline font-black text-white tracking-tighter leading-none">ShotZoo</div>
                        <div class="text-[10px] font-bold text-white/50 uppercase tracking-[0.3em] mt-2">Jungle of Ad Creation</div>
                    </div>
                </div>
            </div>
            <!-- Footer Tagline -->
            <div class="z-10">
                <h2 class="text-4xl md:text-5xl font-headline font-bold text-white tracking-tighter leading-none mb-4"
                   >
                    Track your work.<br />
                    <span class="text-primary-container">Own your time.</span>
                </h2>
                <p class="text-white/40 font-body text-lg max-w-xs">
                    The sculpted workspace for high-performance workforce management.
                </p>
            </div>
        </section>
        <!-- Right Panel: Authentication Form -->
        <section class="w-full md:w-1/2 bg-on-surface flex flex-col items-center justify-center p-6 md:p-12 relative">
            <div class="w-full max-w-md">
                <!-- Mobile Branding (Hidden on desktop) -->
                <div class="md:hidden flex items-center gap-2 mb-12">
                    <span class="material-symbols-outlined text-primary-container text-4xl"
                        style='font-variation-settings: "FILL" 1;'>camera_enhance</span>
                    <span class="text-2xl font-headline font-bold text-surface tracking-tighter">ShotZoo</span>
                </div>
                <!-- Form Header -->
                <header class="mb-10 text-left">
                    <h1 class="text-4xl font-headline font-bold text-surface-container-lowest tracking-tight mb-2"
                       >Welcome Back</h1>
                    <p class="text-surface-variant font-body font-medium">Sign in to your workspace</p>
                </header>
                <!-- Sign-In Form: Simulated Redirect to Dashboard -->
                <form class="space-y-6" id="signin-form">
                    <!-- Identity Field -->
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-surface-container-highest font-label" for="identity"
                           >Email or Employee ID</label>
                        <div class="relative group">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-surface-variant group-focus-within:text-primary transition-colors"
                               >person</span>
                            <input
                                class="w-full pl-12 pr-4 py-4 bg-surface-container-high/10 border-none rounded-2xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body text-surface-container-lowest placeholder:text-surface-variant/50"
                                id="identity" placeholder="name@company.com" type="text" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-surface-container-highest font-label" for="password"
                           >Password</label>
                        <div class="relative group">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-surface-variant group-focus-within:text-primary transition-colors"
                               >lock</span>
                            <input
                                class="w-full pl-12 pr-12 py-4 bg-surface-container-high/10 border-none rounded-2xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body text-surface-container-lowest placeholder:text-surface-variant/50"
                                id="password" placeholder="••••••••" type="password" />
                            <button
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-surface-variant hover:text-surface transition-colors"
                                type="button">
                                <span class="material-symbols-outlined">visibility</span>
                            </button>
                        </div>
                    </div>
                    <!-- Options Row -->
                    <div class="flex items-center justify-between py-2">
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input class="sr-only" type="checkbox" />
                                <div
                                    class="w-10 h-6 bg-surface-container-highest/20 rounded-full transition-colors group-has-[:checked]:bg-primary-container">
                                </div>
                                <div
                                    class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform group-has-[:checked]:translate-x-4 shadow-sm">
                                </div>
                            </div>
                            <span class="ml-3 text-sm font-bold text-surface-container-highest font-label"
                               >Remember me</span>
                        </label>
                        <a class="text-sm font-bold text-primary-container hover:text-primary transition-colors font-label"
                            href="#">Forgot password?</a>
                    </div>
                    <!-- Submit Button -->
                    <button
                        class="w-full bg-primary-container text-on-primary-container font-headline font-bold py-5 rounded-2xl shadow-clay hover:shadow-clay-hover hover:-translate-y-1 transition-all active:scale-95 duration-200"
                        type="submit">
                        Sign In
                    </button>
                </form>
            </div>
        </section>
    </main>
    <!-- Global Footer Fragment (Suppressed per shell mandate, but shown for copyright context) -->
    <footer class="fixed bottom-0 left-0 w-full p-4 pointer-events-none hidden md:block">
        <div
            class="flex justify-between items-center text-[10px] text-white/20 uppercase tracking-[0.2em] font-bold px-8">
            <div class="">© 2026 ShotZoo.</div>
            <div class="flex gap-6 pointer-events-auto">
                <a class="hover:text-primary transition-colors" href="#">Support</a>
                <a class="hover:text-primary transition-colors" href="#">Privacy</a>
                <a class="hover:text-primary transition-colors" href="#">Terms</a>
            </div>
        </div>
    </footer>
    <script src="api.js"></script>
    <script>
        // Redirect if already logged in
        if (api.getToken()) globalThis.location.href = '/dashboard';

        const form = document.querySelector('form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('identity').value.trim();
            const password = document.getElementById('password').value;
            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.textContent;

            if (!email || !password) {
                alert('Please enter your email/ID and password.');
                return;
            }

            try {
                btn.textContent = 'Signing in...';
                btn.disabled = true;
                await api.login(email, password);
                globalThis.location.href = '/dashboard';
            } catch (err) {
                alert(err.message || 'Login failed. Please check your credentials.');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // Toggle password visibility
        const toggleBtn = document.querySelector('button[type="button"]');
        const pwdField = document.getElementById('password');
        if (toggleBtn && pwdField) {
            toggleBtn.addEventListener('click', () => {
                const isPassword = pwdField.type === 'password';
                pwdField.type = isPassword ? 'text' : 'password';
                toggleBtn.querySelector('.material-symbols-outlined').textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }
    </script>
</body>

</html>
